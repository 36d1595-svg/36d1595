<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>박정원 | Portfolio</title>

<style>
/* =========================================================
   0. GLOBAL DESIGN SYSTEM
   ========================================================= */

/* 색상 변수 (전체 테마 통일) */
:root{
  --bg1:#0b0f1a;
  --bg2:#111a2e;
  --accent:#6c7bff;
  --accent2:#00d4ff;
  --text:#eaf0ff;
  --muted:#a9b4d0;
  --card:rgba(255,255,255,0.06);
  --stroke:rgba(255,255,255,0.12);
  --shadow:0 20px 60px rgba(0,0,0,0.4);
}

/* 기본 초기화 */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Segoe UI", sans-serif;
}

html,body{
  width:100%;
  height:100%;
  background: radial-gradient(circle at top, var(--bg2), var(--bg1));
  color:var(--text);
  overflow-x:hidden;
}

/* 스크롤바 */
::-webkit-scrollbar{
  width:8px;
}
::-webkit-scrollbar-thumb{
  background:linear-gradient(var(--accent),var(--accent2));
  border-radius:10px;
}

/* =========================================================
   1. BACKGROUND EFFECTS
   ========================================================= */

.bg-blobs{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
  overflow:hidden;
}

.blob{
  position:absolute;
  width:400px;
  height:400px;
  filter: blur(80px);
  opacity:0.4;
  animation: float 10s infinite ease-in-out;
}

.blob:nth-child(1){
  background:var(--accent);
  top:10%;
  left:20%;
}
.blob:nth-child(2){
  background:var(--accent2);
  top:60%;
  left:70%;
}
.blob:nth-child(3){
  background:#ff4fd8;
  top:40%;
  left:40%;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-40px)}
}

/* =========================================================
   2. HERO SECTION
   ========================================================= */

.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.hero h1{
  font-size:64px;
  letter-spacing:-1px;
}

.hero p{
  font-size:20px;
  color:var(--muted);
  margin-top:10px;
}

.typing{
  font-size:22px;
  margin-top:20px;
  color:var(--accent2);
  border-right:2px solid white;
  white-space:nowrap;
  overflow:hidden;
}

/* =========================================================
   3. SECTION LAYOUT
   ========================================================= */

section{
  padding:100px 10%;
}

.section-title{
  font-size:32px;
  margin-bottom:30px;
}

/* =========================================================
   4. CARD SYSTEM
   ========================================================= */

.card{
  background:var(--card);
  border:1px solid var(--stroke);
  border-radius:20px;
  padding:25px;
  backdrop-filter: blur(12px);
  box-shadow:var(--shadow);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
  border-color:var(--accent2);
}

/* =========================================================
   5. ABOUT GRID
   ========================================================= */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* =========================================================
   6. SKILLS BARS
   ========================================================= */

.skill{
  margin-bottom:15px;
}

.skill-bar{
  width:100%;
  height:10px;
  background:#1c2742;
  border-radius:10px;
  overflow:hidden;
}

.skill-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  width:0%;
  transition:2s;
}

/* =========================================================
   7. FAVORITES
   ========================================================= */

.favorite-item{
  text-align:center;
  font-size:18px;
  padding:20px;
}

/* =========================================================
   8. QUOTE
   ========================================================= */

.quote{
  font-size:28px;
  text-align:center;
  font-style:italic;
  padding:60px;
}

/* =========================================================
   9. FOOTER
   ========================================================= */

footer{
  text-align:center;
  padding:40px;
  color:var(--muted);
}

/* =========================================================
   10. ANIMATIONS
   ========================================================= */

.fade-in{
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}

.fade-in.show{
  opacity:1;
  transform:translateY(0);
}

/* =========================================================
   11. RESPONSIVE
   ========================================================= */

@media(max-width:768px){
  .hero h1{font-size:40px;}
  section{padding:60px 5%;}
}

/* =========================================================
   12. EXTRA DECORATIVE LINES (for premium feel)
   ========================================================= */

.glow-line{
  width:100%;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  margin:40px 0;
}

/* =========================================================
   13. BUTTON STYLE (future expansion)
   ========================================================= */

.btn{
  padding:10px 20px;
  border-radius:10px;
  border:none;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

/* =========================================================
   14. SPACER CLASSES (utility)
   ========================================================= */

.mt-10{margin-top:10px;}
.mt-20{margin-top:20px;}
.mt-40{margin-top:40px;}
.center{text-align:center;}

/* =========================================================
   15. EXTRA ANIMATIONS
   ========================================================= */

@keyframes pulse{
  0%{opacity:0.6}
  50%{opacity:1}
  100%{opacity:0.6}
}

/* =========================================================
   16. DEBUG SAFE AREA (ignore visually)
   ========================================================= */
/* intentionally left minimal */

/* =========================================================
   END OF CSS (but extended for requirement)
   ========================================================= */

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg-blobs">
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="blob"></div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>박정원</h1>
  <div class="typing" id="typing"></div>
  <p>집을 향한 끝없는 여정</p>
</div>

<!-- ABOUT -->
<section class="fade-in">
  <div class="section-title">About Me</div>
  <div class="grid">
    <div class="card">
      <h3>이름</h3>
      <p>박정원</p>
    </div>
    <div class="card">
      <h3>한 줄 소개</h3>
      <p>집가고싶다</p>
    </div>
    <div class="card">
      <h3>관심 분야</h3>
      <p>집</p>
    </div>
    <div class="card">
      <h3>취미</h3>
      <p>잠자기</p>
    </div>
  </div>
</section>

<div class="glow-line"></div>

<!-- SKILLS -->
<section class="fade-in">
  <div class="section-title">My Skills</div>

  <div class="card">
    <div class="skill">
      <p>잠자기</p>
      <div class="skill-bar"><div class="skill-fill" data-width="95%"></div></div>
    </div>

    <div class="skill">
      <p>집 생각하기</p>
      <div class="skill-bar"><div class="skill-fill" data-width="100%"></div></div>
    </div>

    <div class="skill">
      <p>버티기</p>
      <div class="skill-bar"><div class="skill-fill" data-width="80%"></div></div>
    </div>
  </div>
</section>

<div class="glow-line"></div>

<!-- FAVORITES -->
<section class="fade-in">
  <div class="section-title">My Favorites</div>

  <div class="grid">
    <div class="card favorite-item">🏠 집</div>
    <div class="card favorite-item">😴 잠자기</div>
    <div class="card favorite-item">🛏️ 침대</div>
    <div class="card favorite-item">🌙 밤</div>
  </div>
</section>

<div class="glow-line"></div>

<!-- DREAM -->
<section class="fade-in">
  <div class="section-title">My Dream</div>

  <div class="card center">
    <p>앞으로 해보고 싶은 것</p>
    <h2 class="mt-20">대학교 가기</h2>
    <p class="mt-20">그리고 더 오래 자는 방법 찾기</p>
  </div>
</section>

<div class="glow-line"></div>

<!-- QUOTE -->
<section class="fade-in">
  <div class="quote">
    "집에 가고 싶다는 생각은 나의 원동력이다"
  </div>
</section>

<!-- FOOTER -->
<footer>
  Made with AI & My Imagination
</footer>

<script>

/* =========================================================
   1. TYPING EFFECT
   ========================================================= */

const text = "집이 나를 부르고 있다...";
let i = 0;
const typingEl = document.getElementById("typing");

function type(){
  if(i < text.length){
    typingEl.innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 120);
  }
}
type();

/* =========================================================
   2. SCROLL ANIMATION
   ========================================================= */

const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".fade-in").forEach(el=>{
  observer.observe(el);
});

/* =========================================================
   3. SKILL BAR ANIMATION
   ========================================================= */

const fills = document.querySelectorAll(".skill-fill");

function animateSkills(){
  fills.forEach(f=>{
    const width = f.getAttribute("data-width");
    f.style.width = width;
  });
}

setTimeout(animateSkills, 1000);

/* =========================================================
   4. BACKGROUND INTERACTION (subtle movement)
   ========================================================= */

document.addEventListener("mousemove",(e)=>{
  const blobs = document.querySelectorAll(".blob");
  blobs.forEach((b,i)=>{
    const speed = (i+1)*0.01;
    b.style.transform = `translate(${e.clientX*speed}px, ${e.clientY*speed}px)`;
  });
});

/* =========================================================
   5. EXTRA LOOP (ambient pulse simulation)
   ========================================================= */

setInterval(()=>{
  document.body.style.filter = "brightness(1.02)";
  setTimeout(()=>{
    document.body.style.filter = "brightness(1)";
  },200);
},5000);

/* =========================================================
   END SCRIPT
   ========================================================= */

</script>

</body>
</html>
